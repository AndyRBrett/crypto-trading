name: Run trading bot (always-on)

# Runs the bot in the cloud on a schedule, so the dashboard stays fresh without
# your laptop. The bot itself (via the built-in GITHUB_TOKEN) pulls the shared
# portfolio (trading.db) from the bot-state branch at startup and pushes it back
# after the tick, and publishes state.json to gh-pages. If your laptop is
# actively driving (a fresh lease in driver.json), the cloud stands down.

on:
  schedule:
    # Hourly. Entries are decided on settled DAILY candles, so checking once an
    # hour is plenty — it still lets stop-losses / trailing stops react to price
    # within the hour, without the throttling that high-frequency crons (e.g.
    # every 15 min) tend to hit during GitHub's busy periods. Cron timing is
    # best-effort and can be delayed a few minutes, which is fine here.
    - cron: "0 * * * *"
  workflow_dispatch: {} # lets you trigger a run by hand from the Actions tab

# Allow the built-in token to push to gh-pages and the bot-state branch.
permissions:
  contents: write

# Never let two ticks run at once (they'd fight over the portfolio state).
concurrency:
  group: run-bot
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one tick
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
        run: python -m bot.main once --config config.ci.yaml
