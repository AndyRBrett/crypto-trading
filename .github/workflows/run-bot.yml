name: Run trading bot (always-on)

# Runs the bot in the cloud on a schedule, so the dashboard stays fresh without
# your laptop. The bot itself (via the built-in GITHUB_TOKEN) pulls the shared
# portfolio (trading.db) from the bot-state branch at startup and pushes it back
# after the tick, and publishes state.json to gh-pages. If your laptop is
# actively driving (a fresh lease in driver.json), the cloud stands down.

on:
  schedule:
    # Hourly. Entries are decided on settled DAILY candles, so checking once an
    # hour is plenty — it still lets stop-losses / trailing stops react to price
    # within the hour, without the throttling that high-frequency crons (e.g.
    # every 15 min) tend to hit during GitHub's busy periods. Cron timing is
    # best-effort and can be delayed a few minutes, which is fine here.
    - cron: "0 * * * *"
  workflow_dispatch: {} # lets you trigger a run by hand from the Actions tab

# Allow the built-in token to push to gh-pages and the bot-state branch.
permissions:
  contents: write

# Never let two ticks run at once (they'd fight over the portfolio state).
concurrency:
  group: run-bot
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one tick
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
        run: python -m bot.main once --config config.ci.yaml

      # Publish overseer-status.json for the external Project Overseer monitor
      # (issue #16). The tick above pulls each account's trading.<name>.db into
      # the workspace, so write_status.py reads the real trade store here. This
      # workflow ticks hourly but the monitor only needs a daily refresh, so we
      # publish at most once a day to keep main's history clean.
      #
      # We gate on how long it's been since the last publish (the committed
      # generated_at), NOT on a fixed wall-clock hour. GitHub's scheduled crons
      # are best-effort and routinely skip or delay a specific hour, so the old
      # "only publish when the UTC hour is exactly 06" gate kept missing its
      # window and silently froze this file for days (issue #34) — the bot was
      # ticking fine, but no hourly run ever landed in the 06:00 slot. Tying the
      # publish to elapsed time means whichever hourly run first crosses the
      # threshold does the publish, so a dropped cron slot no longer freezes it.
      # A manual run always publishes. If the last time can't be read, we publish
      # rather than skip — silent skipping is exactly the failure mode of #34.
      - name: Publish overseer status
        env:
          EVENT_NAME: ${{ github.event_name }}
          # Publish once the committed status is at least this many hours old.
          # 20h (< 24) leaves margin so a slightly-earlier run the next day still
          # qualifies, while staying well under one publish per day in practice.
          MIN_AGE_HOURS: "20"
        run: |
          publish=1
          if [ "$EVENT_NAME" != "workflow_dispatch" ]; then
            last=$(jq -r '.generated_at // empty' overseer-status.json 2>/dev/null || true)
            # Guard the empty case first: GNU `date -d ""` succeeds and returns
            # "now" (age 0h -> skip), which would re-create #34's silent skip
            # when the status file is missing or has no generated_at.
            last_epoch=""
            if [ -n "$last" ]; then
              last_epoch=$(date -u -d "$last" +%s 2>/dev/null || echo "")
            fi
            if [ -n "$last_epoch" ]; then
              age_hours=$(( ($(date -u +%s) - last_epoch) / 3600 ))
              if [ "$age_hours" -lt "$MIN_AGE_HOURS" ]; then
                echo "Last publish was ${age_hours}h ago (< ${MIN_AGE_HOURS}h); skipping."
                publish=0
              else
                echo "Last publish was ${age_hours}h ago (>= ${MIN_AGE_HOURS}h); publishing."
              fi
            else
              echo "Could not read last publish time; publishing to be safe."
            fi
          fi
          if [ "$publish" != "1" ]; then
            exit 0
          fi
          python write_status.py
          if git status --porcelain overseer-status.json | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add overseer-status.json
            git commit -m "overseer status $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin HEAD:main \
              || { git pull --rebase --autostash origin main && git push origin HEAD:main; }
          else
            echo "overseer-status.json unchanged; nothing to commit."
          fi
