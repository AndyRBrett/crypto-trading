name: Run trading bot (always-on)

# Runs the bot in the cloud on a schedule, so the dashboard stays fresh without
# your laptop. Each run is a fresh machine, so the paper portfolio (trading.db)
# is restored from / saved to a dedicated `bot-state` branch between ticks.
#
# state.json is pushed to gh-pages by the bot itself (via the built-in
# GITHUB_TOKEN), exactly like it does on your laptop.

on:
  schedule:
    # Hourly, at :17 past (off the top of the hour, where GitHub cron is busiest
    # and more likely to be delayed). Timing is approximate by design.
    - cron: "17 * * * *"
  workflow_dispatch: {} # lets you trigger a run by hand from the Actions tab

# Allow the built-in token to push to gh-pages and the bot-state branch.
permissions:
  contents: write

# Never let two ticks run at once (they'd fight over the portfolio state).
concurrency:
  group: run-bot
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore portfolio state
        run: |
          git fetch origin bot-state || true
          if git show origin/bot-state:trading.db > trading.db 2>/dev/null; then
            echo "Restored trading.db from bot-state branch."
          else
            rm -f trading.db
            echo "No prior state found; starting a fresh paper portfolio."
          fi

      - name: Run one tick
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m bot.main once --config config.ci.yaml

      - name: Save portfolio state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp trading.db /tmp/trading.db
          rm -f trading.db
          if git rev-parse --verify origin/bot-state >/dev/null 2>&1; then
            git checkout -B bot-state origin/bot-state
          else
            git checkout --orphan bot-state
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp /tmp/trading.db trading.db
          git add trading.db
          git commit -m "Update portfolio state [skip ci]" || { echo "No state changes to commit."; exit 0; }
          git push origin bot-state
