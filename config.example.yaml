# Copy to config.yaml and edit. Every field is optional — defaults are shown.

# Markets to trade (Coinbase product IDs).
products:
  - BTC-USD
  - ETH-USD

# Paper account.
starting_cash: 10000        # virtual USD to start with
fee_rate: 0.006             # simulated taker fee (0.6%)
buy_fraction: 0.25          # fallback sizing only (used when ATR is unavailable)

# Cadence. Entries are evaluated on settled DAILY candles; polling more often
# than that just lets the protective stops react to price intraday.
poll_interval: 3600         # seconds between decision cycles (hourly stop checks)

# Market data. Backtests show simple TA only clears trading fees on the DAILY
# timeframe — hourly trades too often and bleeds the edge to fees. 300 candles
# so the 200-period trend filter has enough history (~10 months of daily bars).
candle_granularity: ONE_DAY    # ONE_MINUTE / FIVE_MINUTE / FIFTEEN_MINUTE / ONE_HOUR / SIX_HOUR / ONE_DAY
candle_count: 300
exchange: coinbase             # any CCXT exchange id: coinbase, kraken, binance, bybit, ...
data_source: public            # kept for backward compat; "public" (no keys) or "coinbase_advanced" (uses your keys)

# Strategy: trend-following EMA crossover, filtered by a long-term trend MA,
# an ADX chop filter, RSI, and (optionally) news sentiment.
strategy:
  fast_period: 20
  slow_period: 50
  ma_type: ema                  # "ema" or "sma"
  allow_trend_reentry: true     # enter while fast MA > slow MA (filters passing),
                                # not only on the exact crossover bar. Avoids
                                # missing trends when the bot isn't ticking on the
                                # crossover candle. Set false for strict edge-only entries.
  rsi_period: 14
  rsi_overbought: 85            # 70 over-blocks entries in trends; the daily sweep
                               # favors 85+ (a strong uptrend pins RSI high)
  rsi_oversold: 30
  trend_filter: true            # only go long while price is above the trend MA
  trend_period: 200
  adx_filter: true              # only trade when a real trend is present
  adx_period: 14
  adx_min: 20                   # minimum ADX (trend strength) to trade
  atr_period: 14                # volatility, used for sizing + stops
  sentiment_buy_veto: -0.4      # block BUYs when news sentiment <= this
  sentiment_sell_trigger: -0.6  # risk-off SELL when news sentiment <= this
  # Extra knobs for the alternative strategies (see `accounts` below):
  donchian_period: 20           # donchian_breakout: entry channel lookback
  donchian_exit_period: 10      # donchian_breakout: exit channel lookback
  rsi_mr_oversold: 30           # rsi_mean_reversion: BUY when RSI <= this
  rsi_mr_overbought: 55         # rsi_mean_reversion: SELL when RSI >= this

# Multiple paper accounts, each running a DIFFERENT strategy. Omit this whole
# block to run a single account from the top-level `products`/`strategy` above
# (the original behavior). When present, `accounts` takes over.
#
# strategy_type picks the algorithm:
#   ema_crossover       trend-following EMA crossover (the default/original)
#   rsi_mean_reversion  counter-trend: buy oversold RSI, sell back toward the mean
#   donchian_breakout   breakout: buy new N-bar highs, exit on M-bar lows
#   trend_long_short    symmetric EMA trend follower that can SHORT downtrends
#                       (needs allow_short: true on the account)
#   regime              hold long above the 200-day trend MA, cash below it
#
# Each account gets its own products, starting_cash, and SQLite DB
# (trading.<name>.db). Per-account `strategy:` overrides merge over the
# top-level strategy defaults. Risk params are inherited from the top level
# unless overridden per account. ``allow_short`` (default false) lets an account
# open shorts; only the long/short strategy emits short entries.
accounts:
  - name: trend
    strategy_type: ema_crossover
    products: [BTC-USD, ETH-USD]
    starting_cash: 10000

  - name: mean_reversion
    strategy_type: rsi_mean_reversion
    products: [BTC-USD, SOL-USD]
    starting_cash: 10000
    strategy:
      rsi_period: 14
      rsi_mr_oversold: 30
      rsi_mr_overbought: 55

  - name: breakout
    strategy_type: donchian_breakout
    products: [ETH-USD, SOL-USD]
    starting_cash: 10000
    strategy:
      donchian_period: 20
      donchian_exit_period: 10

  # Symmetric long/short trend follower — can profit when the market falls.
  - name: long_short
    strategy_type: trend_long_short
    products: [BTC-USD, ETH-USD]
    starting_cash: 10000
    allow_short: true        # the only field that enables shorting
    strategy:
      rsi_oversold: 15       # mirror of rsi_overbought: 85, so strong downtrends
                             # (which pin RSI low) aren't blocked from shorting

  # Regime filter: hold long above the 200-day MA, move to cash below it. Wide
  # "disaster only" stops + cap-based sizing so it holds through pullbacks.
  - name: regime
    strategy_type: regime
    products: [BTC-USD, ETH-USD]
    starting_cash: 10000
    risk_per_trade_pct: 0.95
    max_position_pct: 0.95
    stop_loss_atr_mult: 10
    take_profit_atr_mult: 1000
    trailing_stop: false
    fallback_stop_pct: 0.5

# Risk management: volatility-based sizing and protective exits.
risk_per_trade_pct: 0.01     # risk ~1% of equity per trade (sized off the stop)
max_position_pct: 0.30       # cap any single position at 30% of equity
max_open_positions: 3        # max concurrent positions (portfolio heat)
stop_loss_atr_mult: 2.0      # initial stop = entry - 2 * ATR
take_profit_atr_mult: 6.0    # target = entry + 6 * ATR (3:1 reward:risk; daily sweep favors this)
trailing_stop: true          # ride winners with a Chandelier trailing stop
fallback_stop_pct: 0.08      # stop distance when ATR isn't available
# Bars to block NEW entries in a product after a protective stop closed a
# position there. Level-triggered re-entry otherwise re-arms on the very next
# tick — observed live as a stop-out re-shorted 2h later at a worse price.
# 0 disables (default): behavior is exactly as before. Overridable per account.
reentry_cooldown_bars: 0

# Claude trade explanations.
explanations_enabled: true
explain_model: claude-opus-4-8   # falls back to a templated rationale if no API key

# News sentiment: Claude scores recent headlines and folds the result into
# signals (confirms/vetoes price-based decisions; never invents a BUY on its
# own). Needs ANTHROPIC_API_KEY + network. Safe no-op without the key.
sentiment_enabled: true
sentiment_model: claude-opus-4-8
sentiment_cache_ttl: 1800        # seconds to reuse a score before refetching
sentiment_max_headlines: 15
news_feeds:
  - https://www.coindesk.com/arc/outboundfeeds/rss/
  - https://cointelegraph.com/rss
  - https://decrypt.co/feed

# Persistence / output.
db_path: trading.db
dashboard_state_path: dashboard/state.json

# Publish to GitHub Pages so you can view the dashboard on your phone.
# The bot pushes state.json to the gh-pages branch each tick; GitHub Pages
# serves it at https://<your-user>.github.io/<repo>/ . Needs GITHUB_TOKEN.
publish_enabled: false
publish_repo: ""          # "owner/repo", e.g. AndyRBrett/crypto-trading
publish_branch: gh-pages
publish_path: state.json

# Driver coordination: let your laptop take priority over the cloud and share
# ONE continuous portfolio between them. To make your laptop the fast driver,
# set publish_enabled: true + publish_repo above, then enable this. Needs
# GITHUB_TOKEN. The cloud (config.ci.yaml) uses driver_role: cloud.
coordinate_enabled: false
driver_role: local        # this machine is the laptop driver
lease_ttl_seconds: 1800   # cloud stands down while this laptop was seen < 30 min ago
state_branch: bot-state   # shared branch holding trading.db + driver.json
state_db_path: trading.db
lease_path: driver.json

# Push notifications via the dashboard PWA — get phone alerts without polling.
#
# How to set up (one-time, takes ~2 minutes):
#   1. Open the dashboard in Safari on your iPhone (or Chrome on Android).
#      On iOS, add it to your Home Screen first so push works.
#   2. Tap the 🔔 bell icon in the top-right corner.
#   3. Allow notifications when the browser prompts.
#   4. Copy the subscription JSON that appears.
#   5. Add it as a GitHub Actions secret named PUSH_SUBSCRIPTION.
#   6. Add VAPID_PRIVATE_KEY as a second GitHub Actions secret — generate your
#      own key pair (see .env.example), never reuse a value from docs/history.
#
# You'll get a "Profit" alert on every winning sell and a "New portfolio high"
# alert whenever the portfolio hits a fresh all-time high.
#
# No extra app to install — notifications come through the dashboard itself.
vapid_claims_email: mailto:bot@example.com  # optional contact for VAPID
