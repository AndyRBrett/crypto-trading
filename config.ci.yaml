# Config for the scheduled GitHub Actions run ("always-on" hosting).
#
# This is what the cloud bot uses (bot/main.py --config config.ci.yaml). It is
# committed to the repo on purpose, so keep ONLY non-secret settings here.
# Secrets (ANTHROPIC_API_KEY, the GitHub token) come from Actions secrets/env,
# never from this file. Your local config.yaml stays separate and gitignored.

# Trade on the DAILY timeframe. Backtests over multiple years show simple TA only
# clears trading fees on daily candles — hourly trades ~5x more often and bleeds
# the (small) edge to fees. Entries fire on settled daily bars; the bot still
# polls hourly so protective stops react to price intraday.
candle_granularity: ONE_DAY
# 300 candles so the 200-period trend filter has enough history (~10 months daily).
candle_count: 300

# Shared strategy defaults. Each account below inherits these and overrides as
# needed. (Top-level `products`/`strategy` are only used if `accounts` is omitted.)
strategy:
  fast_period: 20
  slow_period: 50
  ma_type: ema
  rsi_period: 14
  rsi_overbought: 85   # 70 over-blocks entries in trends (daily sweep favors 85+)
  rsi_oversold: 30
  trend_filter: true
  trend_period: 200
  adx_filter: true
  adx_period: 14
  adx_min: 20
  atr_period: 14
  sentiment_buy_veto: -0.4
  sentiment_sell_trigger: -0.6
  donchian_period: 20
  donchian_exit_period: 10
  rsi_mr_oversold: 30
  rsi_mr_overbought: 55

# Three paper accounts, each running a different strategy. Each keeps its own
# portfolio in trading.<name>.db (shared to the bot-state branch).
accounts:
  - name: trend
    strategy_type: ema_crossover
    products: [BTC-USD, ETH-USD]
    starting_cash: 10000

  - name: mean_reversion
    strategy_type: rsi_mean_reversion
    products: [BTC-USD, SOL-USD]
    starting_cash: 10000

  - name: breakout
    strategy_type: donchian_breakout
    products: [ETH-USD, SOL-USD]
    starting_cash: 10000

  # Symmetric trend follower that can SHORT confirmed downtrends — the only
  # sleeve that can make money while the market falls (instead of sitting in
  # cash like the long-only accounts). Inherits the default ATR stops/targets.
  - name: long_short
    strategy_type: trend_long_short
    products: [BTC-USD, ETH-USD]
    starting_cash: 10000
    allow_short: true
    strategy:
      # Mirror of the long side's rsi_overbought: 85 — a strong downtrend pins
      # RSI low, so a high oversold floor (30) would block shorts exactly when
      # the trend is strongest. 15 only stands aside at a washed-out extreme.
      rsi_oversold: 15

  # Stay-invested regime filter: hold a long while price is above the 200-day
  # trend MA (capturing the bull-market upside the tactical accounts give up),
  # move to cash on a break below it. Sized to the equity cap and given wide
  # "disaster only" stops so it holds through ordinary pullbacks — the routine
  # exit is the regime break, not an ATR stop.
  - name: regime
    strategy_type: regime
    products: [BTC-USD, ETH-USD]
    starting_cash: 10000
    risk_per_trade_pct: 0.95
    max_position_pct: 0.95
    stop_loss_atr_mult: 10
    take_profit_atr_mult: 1000
    trailing_stop: false
    fallback_stop_pct: 0.5

  # Cross-sectional momentum rotation: rank the universe by trailing 90-bar
  # return, hold ONLY the leader and only while it trades above its own
  # 200-bar trend MA — otherwise cash. A relative-strength mechanism, unlike
  # the per-asset time-series rules above. NOT enabled by default; uncomment
  # to run it as a sixth paper account. NOTE: multi-year backtest validation
  # is still outstanding (the backtester is single-instrument).
  # - name: rotation
  #   strategy_type: momentum_rotation
  #   products: [BTC-USD, ETH-USD, SOL-USD]
  #   starting_cash: 10000
  #   risk_per_trade_pct: 0.95   # size to the cap like the regime account
  #   max_position_pct: 0.95
  #   stop_loss_atr_mult: 10     # wide disaster stop; rotation is the exit
  #   take_profit_atr_mult: 1000
  #   trailing_stop: false
  #   fallback_stop_pct: 0.5
  #   strategy:
  #     rotation_lookback_bars: 90

# Risk management: volatility-based sizing and protective exits.
risk_per_trade_pct: 0.01
max_position_pct: 0.30
max_open_positions: 3
stop_loss_atr_mult: 2.0
take_profit_atr_mult: 6.0   # 3:1 reward:risk; daily sweep favors wider targets
trailing_stop: true
fallback_stop_pct: 0.08
# Post-stop-out re-entry cooldown (bars). OFF (0) = current behavior; set to
# e.g. 1 to make a product sit out one daily bar after a protective stop
# before a new entry is allowed (stops the stop-out -> instant-re-entry
# whipsaw seen on long_short 2026-07-02).
reentry_cooldown_bars: 0

# Cross-account exposure guard: OFF = read-only (combined gross/net exposure
# is still computed and logged each tick). Enable to veto new entries that
# would push combined gross exposure over max_gross_exposure_pct x combined
# equity across all five accounts. Never blocks exits.
portfolio_guard_enabled: false
max_gross_exposure_pct: 1.5

# News sentiment (needs the ANTHROPIC_API_KEY Actions secret; safe no-op without).
sentiment_enabled: true

# Publish state.json to the gh-pages branch so the dashboard updates.
publish_enabled: true
publish_repo: AndyRBrett/crypto-trading
publish_branch: gh-pages
publish_path: state.json

# Driver coordination: stand down while the laptop is actively driving, and
# share one continuous portfolio (trading.db on the bot-state branch).
coordinate_enabled: true
driver_role: cloud
lease_ttl_seconds: 1800
